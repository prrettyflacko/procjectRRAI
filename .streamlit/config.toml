# Пастельная светлая тема (мужские, спокойные оттенки: сталь/шалфей/камень).
# Базовые цвета для ВСЕХ виджетов — текст всегда тёмный на светлом.
[theme]
base = "light"
primaryColor = "#5E7E92"            # приглушённый сине-стальной (акцент, кнопки)
backgroundColor = "#F4F5F4"         # холодный светло-серый фон
secondaryBackgroundColor = "#E8ECEC" # светлый стальной (поля, бабблы)
textColor = "#33404A"               # глубокий сланцевый текст
font = "sans serif"

[server]
headless = true
