services:
  db:
    image: postgres:16
    container_name: datamind-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: datamind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d datamind"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: datamind-api
    env_file: .env
    environment:
      # Внутри compose БД доступна по имени сервиса db, а не localhost.
      DATABASE_URL: postgresql://user:pass@db:5432/datamind
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
